apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ui
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: ui
  namespaceSelector:
    matchNames: 
      - retail-store-prod
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 30s
