global:
  image:
    repository: rajsingh8826
    tag: latest
    pullPolicy: IfNotPresent
    containerPort: 8080
    servicePort: 8080
ui:
  serviceType: LoadBalancer
  env:
    - name: JAVA_OPTS
      value: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom"
    - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
      value: "true"
    - name: RETAIL_UI_ENDPOINTS_CATALOG
      value: "http://catalog:8080"
    - name: RETAIL_UI_ENDPOINTS_CARTS
      value: "http://carts:8080"
    - name: RETAIL_UI_ENDPOINTS_ORDERS
      value: "http://orders:8080"
    - name: RETAIL_UI_ENDPOINTS_CHECKOUT
      value: "http://checkout:8080"

orders:
  hasDatabase: true
  dbImage: postgres:16.1
  dbPort: 5432
  dbEnv: 
    - name: POSTGRES_USER
      value: "orders_user"
    - name: POSTGRES_PASSWORD
      value: "12345"
    - name: POSTGRES_DB
      value: "orders"
  env:
    - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
      value: "orders-db:5432"
    - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
      value: "12345"
    - name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
      value: "postgres"
    - name: RETAIL_ORDERS_PERSISTENCE_NAME
      value: "orders"
    - name: RETAIL_ORDERS_PERSISTENCE_USERNAME
      value: "orders_user"
    - name: RETAIL_ORDERS_MESSAGING_PROVIDER
      value: "rabbitmq-db"
    - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES
      value: "rabbitmq-db:5672"
    - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME
      value: "rabbitmq"
    - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD
      value: "12345"

carts:
  hasDatabase: true
  dbImage: amazon/dynamodb-local:1.20.0
  dbPort: 8000
  env:
    - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
      value: "true"
    - name: RETAIL_CART_PERSISTENCE_PROVIDER
      value: "dynamodb"
    - name: RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT
      value: "http://carts-db:8000"
    - name: RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE
      value: "true"
    - name: AWS_ACCESS_KEY_ID
      value: "key"
    - name: AWS_SECRET_ACCESS_KEY
      value: "dummy"

checkout:
  hasDatabase: true
  dbImage: redis:6-alpine
  dbPort: 6379
  env:
    - name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
      value: "redis"
    - name: RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL
      value: "redis://checkout-db:6379"
    - name: RETAIL_CHECKOUT_ENDPOINTS_ORDERS
      value: "http://orders:8080"

catalog:
  hasDatabase: true
  dbImage: mariadb:10.9
  dbPort: 3306
  dbEnv:
    - name: MYSQL_ROOT_PASSWORD
      value: "12345" 
    - name: MYSQL_USER
      value: "catalog_user"
    - name: MYSQL_PASSWORD
      value: "12345"
    - name: MYSQL_DATABASE
      value: "catalogdb"
    - name: MYSQL_ALLOW_EMPTY_PASSWORD
      value: "true" 
  env:
    - name: RETAIL_CATALOG_PERSISTENCE_ENDPOINT
      value: "catalog-db:3306"
    - name: RETAIL_CATALOG_PERSISTENCE_PASSWORD
      value: "12345"
    - name: RETAIL_CATALOG_PERSISTENCE_PROVIDER
      value: "mysql"
    - name: RETAIL_CATALOG_PERSISTENCE_NAME
      value: "catalogdb"
    - name: RETAIL_CATALOG_PERSISTENCE_USERNAME
      value: "catalog_user"

rabbitmq:
  hasDatabase: true
  dbImage: rabbitmq:3-management
  extraPorts:
    - name: amqp
      port: 5672
    - name: http
      port: 15672
  env:
    - name: RABBITMQ_DEFAULT_USER
      value: "rabbitmq"
    - name: RABBITMQ_DEFAULT_PASS
      value: "12345"
