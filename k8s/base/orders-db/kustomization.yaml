apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- statefulset.yaml
- service.yaml

labels:
- includeSelectors: true
  pairs:
    app: orders-db

secretGenerator:
- literals:
  - POSTGRES_USER=orders_user
  - POSTGRES_PASSWORD=12345
  - POSTGRES_DB=orders
  name: orders-db-secret

